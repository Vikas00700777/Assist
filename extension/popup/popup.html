<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Assistant</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <main class="popup-main">
      <header class="popup-header">
        <h1>X Assistant</h1>
      </header>

      <section class="input-section" aria-labelledby="input-heading">
        <h2 id="input-heading">Reply Context</h2>
        <label for="contextText">Post / Context</label>
        <textarea
          id="contextText"
          class="context-textarea"
          name="contextText"
          rows="3"
          placeholder="Paste the post you want to reply to, or add thread context here..."
        ></textarea>
        <button id="useSelectedAsContextBtn" class="light-btn" type="button">Use Selected Text as Context</button>

        <label for="postText">Reply or Comment to Answer (Optional)</label>
        <textarea
          id="postText"
          class="reply-textarea"
          name="postText"
          rows="5"
          placeholder="Paste a reply/comment here if you are answering someone in a thread..."
        ></textarea>
        <button id="useSelectedTextBtn" class="light-btn" type="button">Use Selected Text as Reply</button>

        <label for="toneSelect">Tone</label>
        <select id="toneSelect" name="tone" hidden>
          <option value="friendly">Friendly</option>
          <option value="professional">Professional</option>
          <option value="funny">Funny</option>
          <option value="short">Short</option>
          <option value="supportive">Supportive</option>
          <option value="hinglish">Hinglish</option>
        </select>
        <div class="tone-select" id="toneSelectMenu">
          <button
            id="toneMenuButton"
            class="tone-menu-button"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            <span id="toneMenuLabel">Friendly</span>
            <span class="tone-menu-caret" aria-hidden="true"></span>
          </button>
          <div class="tone-menu" id="toneMenu" role="listbox" aria-label="Tone options" hidden>
            <button class="tone-option" type="button" role="option" data-tone="friendly">Friendly</button>
            <button class="tone-option" type="button" role="option" data-tone="professional">Professional</button>
            <button class="tone-option" type="button" role="option" data-tone="funny">Funny</button>
            <button class="tone-option" type="button" role="option" data-tone="short">Short</button>
            <button class="tone-option" type="button" role="option" data-tone="supportive">Supportive</button>
            <button class="tone-option" type="button" role="option" data-tone="hinglish">Hinglish</button>
          </div>
        </div>
      </section>

      <section class="actions-section" aria-label="Reply actions">
        <button id="generateRepliesButton" type="button">Generate Replies</button>
        <button id="regenerateBtn" class="secondary-btn" type="button">Regenerate Replies</button>
        <div class="button-row">
          <button id="uploadScreenshotButton" class="light-btn" type="button">Upload Screenshot</button>
          <button id="captureSelectedAreaButton" class="light-btn" type="button">Capture Area</button>
        </div>
        <input id="screenshotInput" type="file" accept="image/*" hidden>
        <div class="button-row">
          <button id="clearTextBtn" class="light-btn" type="button">Clear Text</button>
          <button id="clearRepliesBtn" class="light-btn" type="button">Clear Replies</button>
        </div>
      </section>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>

      <section class="suggestions-section" aria-labelledby="suggestions-heading">
        <h2 id="suggestions-heading">Reply Suggestions</h2>
        <div id="replyList">
          <p class="empty-message">No replies generated yet.</p>
        </div>
      </section>

      <details id="historyDetails" class="history-section collapsible-section">
        <summary id="history-heading">Reply History</summary>
        <div class="collapsible-content">
          <div class="section-title-row">
            <span class="section-label">Saved Replies</span>
            <button id="clearHistoryBtn" class="light-btn small-btn" type="button">Clear History</button>
          </div>
          <div id="historyList" class="history-list">
            <p class="empty-message">No reply history yet.</p>
          </div>
        </div>
      </details>

      <details id="settingsDetails" class="settings-section collapsible-section">
        <summary id="settings-heading">Settings</summary>
        <div class="collapsible-content">
          <label for="defaultToneSelect">Default Tone</label>
          <select id="defaultToneSelect" name="defaultTone" hidden>
            <option value="friendly">Friendly</option>
            <option value="professional">Professional</option>
            <option value="funny">Funny</option>
            <option value="short">Short</option>
            <option value="supportive">Supportive</option>
            <option value="hinglish">Hinglish</option>
          </select>
          <div class="tone-select" id="defaultToneSelectMenu">
            <button
              id="defaultToneMenuButton"
              class="tone-menu-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="defaultToneMenuLabel">Friendly</span>
              <span class="tone-menu-caret" aria-hidden="true"></span>
            </button>
            <div class="tone-menu" id="defaultToneMenu" role="listbox" aria-label="Default tone options" hidden>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="friendly">Friendly</button>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="professional">Professional</button>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="funny">Funny</button>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="short">Short</button>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="supportive">Supportive</button>
              <button class="default-tone-option tone-option" type="button" role="option" data-tone="hinglish">Hinglish</button>
            </div>
          </div>

          <label for="backendUrlInput">Backend URL</label>
          <input
            id="backendUrlInput"
            name="backendUrl"
            type="text"
            placeholder="https://assist-qw4s.onrender.com"
          >

          <button id="saveSettingsBtn" type="button">Save Settings</button>
          <button id="testBackendBtn" class="light-btn" type="button">Check Backend</button>
          <button id="resetExtensionBtn" class="danger-btn" type="button">Reset Extension</button>
        </div>
      </details>
    </main>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/api.js"></script>
  <script src="../utils/ocr.js"></script>
  <script src="popup.js"></script>
</body>
</html>
